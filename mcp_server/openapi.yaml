openapi: 3.0.3
info:
  title: MCP Server API
  version: 1.0.0
paths:
  /devices:
    get:
      summary: List devices
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
    post:
      summary: Create device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Device'
      responses:
        '201':
          description: Created
  /devices/{device_id}:
    get:
      summary: Get device by ID
      parameters:
        - in: path
          name: device_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
components:
  schemas:
    Device:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
      required:
        - name
